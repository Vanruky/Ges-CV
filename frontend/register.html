<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - GES-CV</title>

<link rel="stylesheet" href="./css/styles.css">
</head>

<body>

<div class="container register">

    <h2>Crear Cuenta</h2>

    <div class="grid">
        <input id="nombre" placeholder="Nombre">
        <input id="apellido_paterno" placeholder="Apellido Paterno">
        <input id="apellido_materno" placeholder="Apellido Materno">
    </div>

    <div class="grid">
        <input id="tipo_identificacion" placeholder="Tipo (RUT)">
        <input id="numero_identificacion" placeholder="Número (ej: 12345678-9)">
    </div>

    <input id="correo" placeholder="Correo electrónico">
    
    <div class="grid">
        <input id="password" type="password" placeholder="Contraseña">
        <input id="confirmPassword" type="password" placeholder="Confirmar contraseña">
    </div>

    <button onclick="register()">Crear Cuenta</button>

    <div class="link" onclick="window.location.href='index.html'">
        ¿Ya tienes cuenta? Iniciar sesión
    </div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
