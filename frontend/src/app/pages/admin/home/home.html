<h2 class="page-title">Historial de Postulaciones</h2>

<div class="filters">

  <input type="text"
    placeholder="Buscar..."
    [(ngModel)]="filtroTexto"
    (ngModelChange)="onFiltroChange()" />

  <div class="date-filters">
    <input type="date" [(ngModel)]="desde" (change)="onFechaChange()" />
    <input type="date" [(ngModel)]="hasta" (change)="onFechaChange()" />
  </div>

</div>

<!-- SELECT ALL -->
<div class="select-all">
  <label>
    <input type="checkbox"
      [(ngModel)]="selectAllChecked"
      (change)="toggleSelectAll()"
      [disabled]="!postulantes.length" />

    Seleccionar todos ({{ cantidadFiltrados }})
  </label>
</div>

<div *ngIf="loading">Cargando...</div>

<!-- TABLE -->
<app-table
  [data]="postulantes"
  tipo="historial"
  [selectedIds]="selectedIds"
  (toggleSelection)="toggleSelection($event)">
</app-table>

<!-- ACTIONS -->
<div class="actions">

  <span>{{ cantidadSeleccionados }} seleccionados</span>

  <div class="export-dropdown">

    <button class="btn export"
      (click)="toggleExportMenu()"
      [disabled]="!postulantes.length">

      Exportar ▼ ({{ cantidadSeleccionados }})
    </button>

    <div *ngIf="showExportMenu" class="dropdown-menu">

      <button (click)="setExportMode('selected')"
        [disabled]="!cantidadSeleccionados">
        Exportar seleccionados
      </button>

      <button (click)="setExportMode('filtered')"
        [disabled]="!postulantes.length">
        Exportar filtrados
      </button>

    </div>
  </div>

  <button class="btn danger"
    (click)="depurar()"
    [disabled]="!cantidadSeleccionados">

    Eliminar
  </button>

</div>

<!-- TOAST -->
<div *ngIf="toastVisible" class="toast" [ngClass]="toastType">
  {{ toastMessage }}
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="showModal">
  <div class="modal">

    <h3>Confirmación</h3>
    <p>{{ modalMessage }}</p>

    <button (click)="cancelarEliminar()">Cancelar</button>
    <button (click)="confirmarEliminar()">Eliminar</button>

  </div>
</div>
